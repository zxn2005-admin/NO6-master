# Tomcat
server:
  tomcat:
    uri-encoding: UTF-8
  port: 8080
  servlet:
    context-path: /cl515882190

spring:
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    # 新增 allowPublicKeyRetrieval=true 参数，解决 MySQL 8.x 公钥检索问题
    url: jdbc:mysql://127.0.0.1:3306/zzz?useUnicode=true&characterEncoding=utf-8&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root

  #        driverClassName: com.microsoft.sqlserver.jdbc.SQLServerDriver
  #        url: jdbc:sqlserver://127.0.0.1:1433;DatabaseName=cl515882190
  #        username: sa
  #        password: 123456

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  resources:
    static-locations: classpath:static/,file:static/

#mybatis-plus
mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  # 实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: com.cl.entity
  global-config:
    # 主键类型  0:"数据库ID自增", 1:"用户输入ID",2:"全局唯一ID (数字类型唯一ID)", 3:"全局唯一ID UUID"
    id-type: 1
    # 字段策略 0:"忽略判断",1:"非 NULL 判断"),2:"非空判断"
    field-strategy: 1
    # 驼峰下划线转换
    db-column-underline: true
    # 刷新mapper 调试神器
    refresh-mapper: true
    # 逻辑删除配置
    logic-delete-value: -1
    logic-not-delete-value: 0
    # 自定义SQL注入器
    sql-injector: com.baomidou.mybatisplus.mapper.LogicSqlInjector
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    # springboot 项目mybatis plus 设置 jdbcTypeForNull (oracle数据库需配置JdbcType.NULL, 默认是Other)
    jdbc-type-for-null: 'null'
